const SUPABASE_PUBLISHABLE_KEY =

const USER_COLORS = ["#3478f6", "#7658dc", "#16a06b", "#df4e5b"];

function mapProfile(row, index = 0) {
  return {
    id: row.id,
    name: row.name || "未命名成员",
    role: row.role || "member",
    department: row.department || "",
    active: row.active !== false,
    workdays: row.workdays || [1, 2, 3, 4, 5],
    color: USER_COLORS[index % USER_COLORS.length]
  };
}

function mapProject(row) {
  return {
    id: row.id,
    name: row.name,
    ownerId: row.owner_id || null,
    owner: "",
    progress: row.progress || 0,
    status: row.status || "planning",
    dueDate: row.due_date || "",
    tasks: 0,
    overdue: 0
  };
}

function mapTask(row) {
  return {
    id: row.id,
    title: row.title,
    assigneeId: row.assignee_id,
    projectId: row.project_id,
    createdBy: row.created_by,
    priority: row.priority || "medium",
    status: row.status || "pending",
    progress: row.progress || 0,
    dueDate: row.due_date,
    latest: row.latest_update || ""
  };
}

function mapTodo(row) {
  return {
    id: row.id,
    userId: row.user_id,
    title: row.title,
    meta: row.note || "",
    priority: row.priority || "medium",
    createdAt: row.created_at || null,
    completedAt: row.completed_at || null,
    attachments: [],
    done: Boolean(row.completed_at)
  };
}

function mapTodoAttachment(row) {
  return {
    id: row.id,
    todoId: row.todo_id,
    uploadedBy: row.uploaded_by,
    name: row.name,
    storagePath: row.storage_path,
    mimeType: row.mime_type || "application/octet-stream",
    sizeBytes: row.size_bytes || 0,
    createdAt: row.created_at || null
  };
}


function getLoginErrorMessage(error) {
  const message = error?.message || "";
  if (/invalid login credentials/i.test(message)) return "邮箱或密码不正确";
  if (/email not confirmed/i.test(message)) return "邮箱尚未确认";
  return "登录失败，请稍后重试";
}

function createAuthService(supabase) {
  return {
    async getSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;
      return data.session;
    },
    async signIn(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw new Error(getLoginErrorMessage(error));
      return data;
    },
    async signOut() {
      const { error } = await supabase.auth.signOut();
      if (error) throw error;
    }
  };
}




const ATTACHMENT_BUCKET = "workbench-files";
const MAX_ATTACHMENT_SIZE = 20 * 1024 * 1024;
const MAX_SAFE_FILE_NAME_LENGTH = 120;

function throwIfError(result) {
  if (result.error) throw result.error;
  return result.data;
}

function getSafeFileName(name) {
  const baseName = String(name || "file")
    .split(/[\\/]/)
    .pop()
    .trim();
  return (baseName.replace(/[^\p{L}\p{N}._-]/gu, "-") || "file")
    .slice(0, MAX_SAFE_FILE_NAME_LENGTH);
}

function assertSafePathSegment(value, label) {
  if (!value || /[\\/]/.test(String(value))) {
    throw new Error(`无效的${label} ID`);
  }
}

function createRepository(supabase) {
  return {
    async loadWorkbenchData() {
      const [profiles, projects, tasks, todos, todoAttachments] = await Promise.all([
        supabase.from("profiles").select("*"),
        supabase.from("projects").select("*"),
        supabase.from("tasks").select("*"),
        supabase.from("todos").select("*"),
        supabase.from("todo_attachments").select("*")
      ]);

      const mappedTodos = throwIfError(todos).map(mapTodo);
      const todosById = new Map(mappedTodos.map((todo) => [todo.id, todo]));
      for (const row of throwIfError(todoAttachments)) {
        const attachment = mapTodoAttachment(row);
        todosById.get(attachment.todoId)?.attachments.push(attachment);
      }

      return {
        users: throwIfError(profiles).map(mapProfile),
        projects: throwIfError(projects).map(mapProject),
        tasks: throwIfError(tasks).map(mapTask),
        todos: mappedTodos,
        reports: [],
        events: [],
        files: []
      };
    },
    async createTask(task) {
      return throwIfError(
        await supabase
          .from("tasks")
          .insert({
            title: task.title,
            assignee_id: task.assigneeId,
            project_id: task.projectId || null,
            priority: task.priority || "medium",
            due_date: task.dueDate,
            created_by: task.createdBy,
            status: "pending",
            progress: 0
          })
          .select()
          .single()
      );
    },
    async updateTask(id, values) {
      return throwIfError(
        await supabase
          .from("tasks")
          .update({
            status: values.status,
            progress: values.progress,
            latest_update: values.latest
          })
          .eq("id", id)
      );
    },
    async createTodo(todo) {
      return throwIfError(
        await supabase
          .from("todos")
          .insert({
            user_id: todo.userId,
            title: todo.title,
            note: todo.note || "",
            priority: todo.priority || "medium"
          })
          .select()
          .single()
      );
    },
    async setTodoDone(id, done) {
      return throwIfError(
        await supabase
          .from("todos")
          .update({ completed_at: done ? new Date().toISOString() : null })
          .eq("id", id)
      );
    },
    async uploadTodoAttachment({ todoId, userId, file }) {
      assertSafePathSegment(userId, "用户");
      assertSafePathSegment(todoId, "待办");
      if (!file || !file.name) {
        throw new Error("请选择文件");
      }
      if (!Number.isFinite(file.size) || file.size <= 0) {
        throw new Error("不能上传空文件");
      }
      if (file.size > MAX_ATTACHMENT_SIZE) {
        throw new Error("文件不能超过 20 MB");
      }

      const path = `todos/${userId}/${todoId}/${crypto.randomUUID()}-${getSafeFileName(file.name)}`;
      throwIfError(
        await supabase.storage
          .from(ATTACHMENT_BUCKET)
          .upload(path, file)
      );

      try {
        const row = throwIfError(
          await supabase
            .from("todo_attachments")
            .insert({
              todo_id: todoId,
              uploaded_by: userId,
              name: file.name,
              storage_path: path,
              mime_type: file.type || "application/octet-stream",
              size_bytes: file.size
            })
            .select()
            .single()
        );
        return mapTodoAttachment(row);
      } catch (error) {
        try {
          const cleanupResult = await supabase.storage
            .from(ATTACHMENT_BUCKET)
            .remove([path]);
          if (cleanupResult.error) {
            error.cleanupError = cleanupResult.error;
          }
        } catch (cleanupError) {
          error.cleanupError = cleanupError;
        }
        throw error;
      }
    },
    async getAttachmentUrl(path) {
      const data = throwIfError(
        await supabase.storage
          .from(ATTACHMENT_BUCKET)
          .createSignedUrl(path, 300)
      );
      return data.signedUrl;
    }
  };
}

const VALID_ROUTES = new Set(["dashboard", "tasks", "projects", "todos", "team", "settings"]);

function localDateKey(date = new Date()) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function normalizeRoute(route) {
  return VALID_ROUTES.has(route) ? route : "dashboard";
}

function clampProgress(value) {
  const number = Number(value);
  if (!Number.isFinite(number)) return 0;
  return Math.min(100, Math.max(0, number));
}

function safeHexColor(value, fallback = "#3478f6") {
  return /^#[0-9a-f]{6}$/i.test(String(value || "")) ? String(value) : fallback;
}

function isTaskOverdue(task, today = localDateKey()) {
  return task.status !== "completed" && task.status !== "cancelled" && task.dueDate < today;
}

function missingReportUsers(users, reports, date) {
  const day = new Date(`${date}T12:00:00`).getDay();
  const submitted = new Set(
    reports.filter((report) => report.date === date).map((report) => report.userId)
  );
  return users.filter(
    (user) => user.active && user.workdays.includes(day) && !submitted.has(user.id)
  );
}

function dashboardMetrics(tasks, today) {
  const active = tasks.filter((task) => task.status === "in_progress").length;
  const completed = tasks.filter((task) => task.status === "completed").length;
  const waitingReview = tasks.filter((task) => task.status === "waiting_review").length;
  const overdue = tasks.filter((task) => isTaskOverdue(task, today)).length;
  return {
    active,
    completed,
    waitingReview,
    overdue,
    completionRate: tasks.length ? Math.round((completed / tasks.length) * 100) : 0
  };
}

function visibleTodosForRole(todos, profile) {
  if (profile?.role === "manager") return todos;
  return todos.filter((todo) => todo.userId === profile?.id);
}

function findVisibleAttachment(todos, profile, storagePath) {
  for (const todo of visibleTodosForRole(todos, profile)) {
    const attachment = (todo.attachments || []).find(
      (item) => item.storagePath === storagePath
    );
    if (attachment) return attachment;
  }
  return null;
}

function formatDateTime(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return "";
  return new Intl.DateTimeFormat("zh-CN", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).format(date);
}

function parseQuery(input) {
  const query = input.trim();
  if (/逾期/.test(query)) return { type: "overdue" };
  if (/谁.*(没|未).*日报|缺.*日报/.test(query)) return { type: "missing_reports" };
  const person = query.match(/(?:查看|显示)?\s*([A-Za-z\u4e00-\u9fa5]+)\s*(?:今天|今日).*进度/);
  if (person) return { type: "person_progress", person: person[1], date: "today" };
  const project = query.match(/(?:查看|显示)?项目\s+(.+)/);
  if (project) return { type: "project", project: project[1].trim() };
  if (/待审核|等待审核/.test(query)) return { type: "waiting_review" };
  if (/会议|日程/.test(query)) return { type: "meetings" };
  return { type: "unknown" };
}

function queryAnswer(parsed, data, today) {
  if (parsed.type === "overdue") {
    const items = data.tasks.filter((task) => isTaskOverdue(task, today));
    return { title: `逾期任务 ${items.length} 项`, items: items.map(taskSummary) };
  }
  if (parsed.type === "missing_reports") {
    const items = missingReportUsers(data.users, data.reports, today);
    return { title: `缺少今日日报 ${items.length} 人`, items: items.map((user) => user.name) };
  }
  if (parsed.type === "waiting_review") {
    const items = data.tasks.filter((task) => task.status === "waiting_review");
    return { title: `等待审核 ${items.length} 项`, items: items.map(taskSummary) };
  }
  if (parsed.type === "meetings") {
    return { title: `今日会议 ${data.events.length} 场`, items: data.events.map((event) => `${event.time} ${event.title}`) };
  }
  if (parsed.type === "person_progress") {
    const user = data.users.find((item) => item.name.toLowerCase() === parsed.person.toLowerCase());
    const items = user ? data.tasks.filter((task) => task.assigneeId === user.id) : [];
    return { title: user ? `${user.name} 的工作进度` : "未找到该成员", items: items.map(taskSummary) };
  }
  if (parsed.type === "project") {
    const project = data.projects.find((item) => item.name.includes(parsed.project));
    const items = project ? data.tasks.filter((task) => task.projectId === project.id) : [];
    return { title: project ? `${project.name} · ${project.progress}%` : "未找到该项目", items: items.map(taskSummary) };
  }
  return {
    title: "暂时无法理解这个问题",
    items: ["试试：显示逾期任务", "谁还没有提交今天的日报", "查看 Alice 今天的进度", "查看项目 网站产品页优化"]
  };
}

function taskSummary(task) {
  return `${task.title} · ${task.progress}%`;
}

async function loadWorkbench({ showLoading = true } = {}) {
  if (showLoading) root.innerHTML = loadingView("正在同步真实数据");

  for (const project of state.data.projects) {

  staleMessage,
  button,
  busyText = "处理中...",
  afterSaved
) {
  const originalText = button?.textContent;
  if (button) {
    if (button.disabled) return false;
    button.disabled = true;
    button.textContent = busyText;
  }
  try {
    await action();
  } catch (error) {
    if (button?.isConnected) {
      button.disabled = false;
      button.textContent = originalText;
    }
    toast(error.message || "操作失败，请重试", true);
    return false;
  }

  afterSaved?.();
  await refreshAfterSuccessfulWrite(successMessage, staleMessage);
  if (button?.isConnected) {
    button.disabled = false;
    button.textContent = originalText;
  }
  return true;
}

window.addEventListener("hashchange", () => {
  const requestedRoute = location.hash.slice(1);
  state.route = normalizeRoute(requestedRoute);
  if (requestedRoute !== state.route) {
    history.replaceState(null, "", `#${state.route}`);
  }
  if (state.data) renderApp();
});

document.addEventListener("click", async (event) => {
  const routeTarget = event.target.closest("[data-route]");
  if (routeTarget) {
    event.preventDefault();
    const route = normalizeRoute(routeTarget.dataset.route);
    state.route = route;
    if (location.hash !== `#${route}`) {
      location.hash = route;
    } else if (state.data) {
      renderApp();
    }
    document.querySelector("#sidebar")?.classList.remove("open");
    return;
  }

  const target = event.target.closest("[data-action]");
  if (!target) return;
  const action = target.dataset.action;
  if (action === "menu") document.querySelector("#sidebar")?.classList.toggle("open");
  if (action === "retry") start();
  if (action === "logout") {
    await auth.signOut();
    state.session = null;
    state.profile = null;
    state.data = null;
    renderLogin();
  }
  if (action === "new-task") {
    if (state.profile.role !== "manager") {
      toast("仅管理员可以新建任务", true);
      return;
    }
    openTaskModal();
  }
  if (action === "add-todo") openTodoModal();
  if (action === "close-modal") closeModal();
  if (action === "approve") {
    if (state.profile.role !== "manager") {
      toast("仅管理员可以审核任务", true);
      return;
    }
    await withWrite(
      () => repository.updateTask(target.dataset.id, { status: "completed", progress: 100, latest: "管理员审核通过" }),
      "任务已审核通过",
      "任务已保存，但数据刷新失败，请刷新页面",
      target,
      "审核中..."
    );
  }
  if (action === "toggle-todo") {
    const todo = state.data.todos.find((item) => item.id === target.dataset.id);
    if (!todo) return;
    if (todo.userId !== state.profile.id) {
      toast("只能更新自己的待办", true);
      return;
    }
    await withWrite(
      () => repository.setTodoDone(todo.id, !todo.done),
      "待办状态已更新",
      "待办已保存，但数据刷新失败，请刷新页面",
      target,
      "..."
    );
  }
  if (action === "upload-attachment") {
    const todo = state.data.todos.find((item) => item.id === target.dataset.id);
    const input = document.getElementById(`todo-file-${target.dataset.id}`);
    const file = input?.files?.[0];
    if (!todo || todo.userId !== state.profile.id) {
      toast("只能给自己的待办上传附件", true);
      return;
    }
    if (!file) {
      toast("请先选择要上传的文件", true);
      return;
    }

    const originalText = target.textContent;
    target.disabled = true;
    target.textContent = "上传中...";
    try {
      await repository.uploadTodoAttachment({
        todoId: todo.id,
        userId: state.profile.id,
        file
      });
    } catch (error) {
      target.disabled = false;
      target.textContent = originalText;
      toast(error.message || "附件上传失败，请重试", true);
      return;
    }
    input.value = "";
    await refreshAfterSuccessfulWrite(
      "附件上传成功",
      "附件已上传，但数据刷新失败，请刷新页面"
    );
    if (target.isConnected) {
      target.disabled = false;
      target.textContent = originalText;
    }
  }
  if (action === "view-attachment") {
    const attachment = findVisibleAttachment(
      state.data.todos,
      state.profile,
      target.dataset.path
    );
    if (!attachment) {
      toast("无权查看该附件，或附件已不存在", true);
      return;
    }
    const opened = window.open("about:blank", "_blank");
    if (!opened) {
      toast("浏览器阻止了新窗口，请允许本站弹窗后重试", true);
      return;
    }
    opened.opener = null;
    target.disabled = true;
    try {
      const url = await repository.getAttachmentUrl(attachment.storagePath);
      opened.location.replace(url);
    } catch (error) {
      opened.close();
      toast(error.message || "附件打开失败，请重试", true);
    } finally {
      target.disabled = false;
    }
  }
});

document.addEventListener("keydown", (event) => {
  if (event.key !== "Enter" && event.key !== " ") return;
  const target = event.target.closest('[data-route][role="link"]');
  if (!target) return;
  event.preventDefault();
  target.click();
});

document.addEventListener("submit", async (event) => {
  const action = event.target.dataset.action;
  if (!action) return;
  event.preventDefault();
  const values = Object.fromEntries(new FormData(event.target));
  if (action === "login") {
    root.innerHTML = loadingView("正在登录");
    try {
      await auth.signIn(values.email, values.password);
      state.session = await auth.getSession();
      await loadWorkbench();
    } catch (error) {
      renderLogin(error.message);
    }
  }
  if (action === "save-task") {
    if (state.profile.role !== "manager") {
      toast("仅管理员可以新建任务", true);
      return;
    }
    const submitButton = getSubmitButton(event);
    const succeeded = await withWrite(
      () => repository.createTask({ ...values, createdBy: state.profile.id }),
      "任务已创建",
      "任务已保存，但数据刷新失败，请刷新页面",
      submitButton,
      "创建中...",
      () => event.target.reset()
    );
    if (succeeded) closeModal();
  }
  if (action === "save-todo") {
    const submitButton = getSubmitButton(event);
    const succeeded = await withWrite(
      () => repository.createTodo({ ...values, userId: state.profile.id }),
      "待办已添加",
      "待办已保存，但数据刷新失败，请刷新页面",
      submitButton,
      "添加中...",
      () => event.target.reset()
    );
    if (succeeded) closeModal();
  }
});

function modal(content) {
  document.querySelector("#modal-root").innerHTML = `<div class="modal-backdrop"><div class="modal">${content}</div></div>`;
}
function closeModal() {
  document.querySelector("#modal-root").innerHTML = "";
}
function getSubmitButton(event) {
  return event.submitter || event.target.querySelector('button[type="submit"], button:not([type])');
}
function toast(message, error = false) {
  const toastRoot = document.querySelector("#toast-root");
  toastRoot.innerHTML = `<div class="toast ${error ? "toast-error" : ""}">${escapeHtml(message)}</div>`;
  setTimeout(() => { toastRoot.innerHTML = ""; }, 2500);
}
function kpi(title, value, hint, color = "", route = "") {
  const routeAttribute = route ? ` data-route="${route}" role="link" tabindex="0"` : "";
  return `<div class="card kpi ${route ? "clickable-card" : ""}"${routeAttribute}><div class="kpi-head">${escapeHtml(title)}<span class="iconbox ${color}">${value}</span></div><div class="kpi-value">${value}</div><div class="hint">${escapeHtml(hint)}</div></div>`;
}
function panelTitle(title, action, route = "") {
  const routeAttribute = route ? ` data-route="${route}" role="link" tabindex="0"` : "";
  return `<div class="panel-title"><h2>${escapeHtml(title)}</h2><span class="text-link"${routeAttribute}>${escapeHtml(action)}</span></div>`;
}
function empty(text) {
  return `<div class="empty">${text}</div>`;
}
function isOverdue(task) {
  return isTaskOverdue(task);
}
function statusText(status) {
  return ({ pending: "待处理", in_progress: "进行中", waiting_review: "待审核", completed: "已完成", cancelled: "已取消", planning: "规划中" })[status] || status || "未知";
}
function priorityText(priority) {
  return ({ high: "高", medium: "中", low: "低" })[priority] || priority;
}
function formatFileSize(bytes = 0) {
  const safeBytes = Number.isFinite(Number(bytes)) && Number(bytes) >= 0 ? Number(bytes) : 0;
  if (safeBytes < 1024) return `${safeBytes} B`;
  if (safeBytes < 1024 * 1024) return `${(safeBytes / 1024).toFixed(1)} KB`;
  return `${(safeBytes / (1024 * 1024)).toFixed(1)} MB`;
}
function userName(id) {
  return state.data.users.find((user) => user.id === id)?.name || "未分配";
}
function projectName(id) {
  return state.data.projects.find((project) => project.id === id)?.name || "未归类";
}
function escapeHtml(value = "") {
  const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
  return String(value).replace(/[&<>"']/g, (character) => map[character]);
}

start();

  </script>
