<body>
  <div id="app"></div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
    const SUPABASE_URL = "https://yffvultlrhbckbitjbrm.supabase.co";
const SUPABASE_PUBLISHABLE_KEY =
  "sb_publishable_91NA7dKHOxJE15Fp_zihew_Oz8CiP-r";



const USER_COLORS = ["#3478f6", "#7658dc", "#16a06b", "#df4e5b"];

function mapProfile(row, index = 0) {
  return {
    id: row.id,
    name: row.name || "未命名成员",
    role: row.role || "member",
    department: row.department || "",
    active: row.active !== false,
    workdays: row.workdays || [1, 2, 3, 4, 5],
    color: USER_COLORS[index % USER_COLORS.length]
  };
}

function mapProject(row) {
  return {
    id: row.id,
    name: row.name,
    ownerId: row.owner_id || null,
    owner: "",
    progress: row.progress || 0,
    status: row.status || "planning",
    dueDate: row.due_date || "",
    tasks: 0,
    overdue: 0
  };
}

function mapTask(row) {
  return {
    id: row.id,
    title: row.title,
    assigneeId: row.assignee_id,
    projectId: row.project_id,
    createdBy: row.created_by,
    priority: row.priority || "medium",
    status: row.status || "pending",
    progress: row.progress || 0,
    dueDate: row.due_date,
    latest: row.latest_update || ""
  };
}

function mapTodo(row) {
  return {
    id: row.id,
    userId: row.user_id,
    title: row.title,
    meta: row.note || "",
    priority: row.priority || "medium",
    completedAt: row.completed_at || null,
    done: Boolean(row.completed_at)
  };
}


function getLoginErrorMessage(error) {
  const message = error?.message || "";
  if (/invalid login credentials/i.test(message)) return "邮箱或密码不正确";
  if (/email not confirmed/i.test(message)) return "邮箱尚未确认";
  return "登录失败，请稍后重试";
}

function createAuthService(supabase) {
  return {
    async getSession() {
      const { data, error } = await supabase.auth.getSession();
      if (error) throw error;
      return data.session;
    },
    async signIn(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw new Error(getLoginErrorMessage(error));
      return data;
    },
    async signOut() {
      const { error } = await supabase.auth.signOut();
      if (error) throw error;
    }
  };
}




function throwIfError(result) {
  if (result.error) throw result.error;
  return result.data;
}

function createRepository(supabase) {
  return {
    async loadWorkbenchData() {
      const [profiles, projects, tasks, todos] = await Promise.all([
        supabase.from("profiles").select("*"),
        supabase.from("projects").select("*"),
        supabase.from("tasks").select("*"),
        supabase.from("todos").select("*")
      ]);

      return {
        users: throwIfError(profiles).map(mapProfile),
        projects: throwIfError(projects).map(mapProject),
        tasks: throwIfError(tasks).map(mapTask),
        todos: throwIfError(todos).map(mapTodo),
        reports: [],
        events: [],
        files: []
      };
    },
    async createTask(task) {
      return throwIfError(
        await supabase
          .from("tasks")
          .insert({
            title: task.title,
            assignee_id: task.assigneeId,
            project_id: task.projectId || null,
            priority: task.priority || "medium",
            due_date: task.dueDate,
            created_by: task.createdBy,
            status: "pending",
            progress: 0
          })
          .select()
          .single()
      );
    },
    async updateTask(id, values) {
      return throwIfError(
        await supabase
          .from("tasks")
          .update({
            status: values.status,
            progress: values.progress,
            latest_update: values.latest
          })
          .eq("id", id)
      );
    },
    async createTodo(todo) {
      return throwIfError(
        await supabase
          .from("todos")
          .insert({
            user_id: todo.userId,
            title: todo.title,
            note: todo.note || "",
            priority: todo.priority || "medium"
          })
          .select()
          .single()
      );
    },
    async setTodoDone(id, done) {
      return throwIfError(
        await supabase
          .from("todos")
          .update({ completed_at: done ? new Date().toISOString() : null })
          .eq("id", id)
      );
    }
  };
}


function loginView(message = "") {
  return `
    <main class="auth-page">
      <section class="auth-card">
        <div class="auth-brand"><span class="brandmark">O</span>运营管理工作台</div>
        <div>
          <p class="eyebrow">OPERATIONS WORKBENCH</p>
          <h1>登录工作台</h1>
          <p class="auth-copy">使用管理员分配的邮箱和密码登录。</p>
        </div>
        ${message ? `<div class="auth-error">${message}</div>` : ""}
        <form class="auth-form" data-action="login">
          <label>邮箱<input name="email" type="email" autocomplete="email" required placeholder="name@company.com"></label>
          <label>密码<input name="password" type="password" autocomplete="current-password" required placeholder="请输入密码"></label>
          <button class="btn btn-primary auth-submit">登录</button>
        </form>
        <p class="auth-note">账号由管理员统一创建。如无法登录，请联系管理员。</p>
      </section>
      <aside class="auth-visual">
        <div class="auth-visual-content">
          <span class="live-dot">已连接 Supabase</span>
          <h2>任务、项目和团队进度集中管理</h2>
          <p>权限隔离、真实数据、私有附件存储。</p>
          <div class="auth-stats">
            <div><b>10</b><span>核心数据表</span></div>
            <div><b>21</b><span>业务权限规则</span></div>
            <div><b>4</b><span>附件权限规则</span></div>
          </div>
        </div>
      </aside>
    </main>`;
}

function loadingView(text = "正在加载工作台") {
  return `<main class="state-page"><div class="loader"></div><h2>${text}</h2><p>正在安全读取你的工作数据。</p></main>`;
}

function errorView(message) {
  return `<main class="state-page"><div class="state-icon">!</div><h2>无法打开工作台</h2><p>${message}</p><button class="btn btn-primary" data-action="retry">重新加载</button></main>`;
}




const auth = createAuthService(supabase);
const repository = createRepository(supabase);
const root = document.querySelector("#app");

const state = {
  session: null,
  profile: null,
  data: null,
  route: location.hash.slice(1) || "dashboard"
};

const routeLabels = {
  dashboard: ["运营总览", "团队任务和项目进度"],
  tasks: ["任务管理", "分配、跟踪和审核任务"],
  projects: ["项目管理", "查看项目健康度和整体进展"],
  todos: ["今日待办", "管理个人轻量事项"],
  team: ["团队成员", "查看成员角色和部门"],
  settings: ["系统设置", "账号、权限和云端连接"]
};

async function start() {
  root.innerHTML = loadingView();
  try {
    state.session = await auth.getSession();
    if (!state.session) return renderLogin();
    await loadWorkbench();
  } catch (error) {
    root.innerHTML = errorView(error.message || "连接失败，请稍后重试");
  }
}

async function loadWorkbench() {
  root.innerHTML = loadingView("正在同步真实数据");
  state.data = await repository.loadWorkbenchData();
  state.profile = state.data.users.find((user) => user.id === state.session.user.id);
  if (!state.profile) throw new Error("当前账号尚未建立成员档案，请联系管理员。");
  enrichProjects();
  renderApp();
}

function enrichProjects() {
  for (const project of state.data.projects) {
    const tasks = state.data.tasks.filter((task) => task.projectId === project.id);
    project.tasks = tasks.length;
    project.overdue = tasks.filter((task) => isOverdue(task)).length;
    project.owner = userName(project.ownerId);
  }
}

function renderLogin(message = "") {
  root.innerHTML = loginView(escapeHtml(message));
}

function renderApp() {
  const [title, subtitle] = routeLabels[state.route] || routeLabels.dashboard;
  root.innerHTML = `
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand"><span class="brandmark">O</span>运营管理工作台</div>
        <div class="nav-label">运营管理</div>
        ${navItem("dashboard", "总", "运营总览")}
        ${navItem("tasks", "任", "任务管理")}
        ${navItem("projects", "项", "项目管理")}
        ${navItem("todos", "待", "今日待办")}
        <div class="nav-label">系统</div>
        ${navItem("team", "员", "团队成员")}
        ${navItem("settings", "设", "系统设置")}
        <div class="side-profile">
          <b>${escapeHtml(state.profile.name)}</b>
          ${state.profile.role === "manager" ? "管理员" : "成员"} · ${escapeHtml(state.profile.department || "未设置部门")}
          <button class="side-logout" data-action="logout">退出登录</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div class="page-title">
            <h1><button class="btn mobile-menu" data-action="menu">菜单</button>${title}</h1>
            <p>${subtitle} · ${new Date().toLocaleDateString("zh-CN")}</p>
          </div>
          ${state.profile.role === "manager" && state.route === "tasks"
            ? '<button class="btn btn-primary" data-action="new-task">+ 新建任务</button>'
            : ""}
        </header>
        <div id="page">${renderRoute()}</div>
      </main>
    </div>`;
}

function navItem(route, icon, text) {
  return `<a class="nav-item ${state.route === route ? "active" : ""}" href="#${route}">
    <span class="nav-icon">${icon}</span>${text}
  </a>`;
}

function renderRoute() {
  if (state.route === "tasks") return tasksView();
  if (state.route === "projects") return projectsView();
  if (state.route === "todos") return todosView();
  if (state.route === "team") return teamView();
  if (state.route === "settings") return settingsView();
  return dashboardView();
}

function dashboardView() {
  const { tasks, projects, todos } = state.data;
  const active = tasks.filter((task) => task.status === "in_progress").length;
  const completed = tasks.filter((task) => task.status === "completed").length;
  const review = tasks.filter((task) => task.status === "waiting_review").length;
  const overdue = tasks.filter(isOverdue).length;
  return `
    <section class="kpi-grid">
      ${kpi("进行中任务", active, "当前正在推进")}
      ${kpi("已完成任务", completed, "来自真实数据库", "green")}
      ${kpi("待审核事项", review, "需要管理员处理", "orange")}
      ${kpi("逾期任务", overdue, "建议优先处理", "red")}
      ${kpi("今日待办", todos.filter((todo) => !todo.done).length, "个人事项")}
    </section>
    <section class="dashboard-grid">
      <div class="panel">${panelTitle("重点任务", "实时同步")}${tasks.length ? taskTable(tasks.slice(0, 6)) : empty("暂无任务")}</div>
      <div class="panel">${panelTitle("项目进度", `${projects.length} 个项目`)}
        <div class="project-list">${projects.map(projectCard).join("") || empty("暂无项目")}</div>
      </div>
    </section>`;
}

function tasksView() {
  return `<div class="panel page-panel">${state.data.tasks.length ? taskTable(state.data.tasks) : empty("暂无可见任务")}</div>`;
}

function projectsView() {
  const cards = state.data.projects.map((project) => `
    <article class="panel entity-card">
      <div class="row-between"><h3>${escapeHtml(project.name)}</h3><span class="status">${statusText(project.status)}</span></div>
      <p>负责人：${escapeHtml(project.owner || "未分配")}<br>${project.tasks} 项任务 · ${project.overdue} 项逾期</p>
      <div class="row-between"><b>${project.progress}%</b><span class="hint">${project.dueDate || "未设置日期"}</span></div>
      <div class="track"><span style="width:${project.progress}%"></span></div>
    </article>`).join("");
  return `<div class="cards-grid">${cards || empty("暂无项目")}</div>`;
}

function todosView() {
  const rows = state.data.todos.map((todo) => `
    <div class="todo-row">
      <button class="check ${todo.done ? "done" : ""}" data-action="toggle-todo" data-id="${todo.id}" aria-label="切换完成状态"></button>
      <div class="${todo.done ? "done-text" : ""}"><b>${escapeHtml(todo.title)}</b><small>${escapeHtml(todo.meta)}</small></div>
      <span class="chip">${priorityText(todo.priority)}</span>
    </div>`).join("");
  return `<div class="toolbar"><span></span><button class="btn btn-primary" data-action="add-todo">+ 添加待办</button></div>
    <div class="panel"><div class="todo-list">${rows || empty("暂无待办")}</div></div>`;
}

function teamView() {
  return `<div class="cards-grid">${state.data.users.map((user) => `
    <article class="panel entity-card">
      <div class="row-between"><h3><span class="avatar" style="background:${user.color}">${escapeHtml(user.name[0] || "?")}</span>${escapeHtml(user.name)}</h3><span class="status">${user.active ? "启用" : "停用"}</span></div>
      <p>${user.role === "manager" ? "管理员" : "成员"}<br>${escapeHtml(user.department || "未设置部门")}</p>
    </article>`).join("")}</div>`;
}

function settingsView() {
  return `<div class="cards-grid">
    <article class="panel entity-card"><h3>Supabase 连接</h3><p>已连接真实数据库<br>项目：yffvultlrhbckbitjbrm</p><span class="status">连接正常</span></article>
    <article class="panel entity-card"><h3>当前权限</h3><p>${state.profile.role === "manager" ? "可管理全部任务和成员数据" : "仅可访问分配给自己的数据"}</p></article>
    <article class="panel entity-card"><h3>附件存储</h3><p>私有存储区：workbench-files</p><span class="status">私有</span></article>
  </div>`;
}

function taskTable(tasks) {
  return `<div class="table-wrap"><table class="data-table"><thead><tr><th>任务</th><th>负责人</th><th>项目</th><th>状态</th><th>进度</th><th>截止</th>${state.profile.role === "manager" ? "<th>操作</th>" : ""}</tr></thead>
    <tbody>${tasks.map((task) => `<tr>
      <td><b>${escapeHtml(task.title)}</b><small class="cell-note">${escapeHtml(task.latest)}</small></td>
      <td>${escapeHtml(userName(task.assigneeId))}</td>
      <td>${escapeHtml(projectName(task.projectId))}</td>
      <td><span class="status ${isOverdue(task) ? "red" : ""}">${statusText(task.status)}</span></td>
      <td>${task.progress}%</td><td>${task.dueDate || "-"}</td>
      ${state.profile.role === "manager" ? `<td>${task.status === "waiting_review" ? `<button class="btn btn-soft" data-action="approve" data-id="${task.id}">通过</button>` : ""}</td>` : ""}
    </tr>`).join("")}</tbody></table></div>`;
}

function projectCard(project) {
  return `<div class="project-card"><div class="project-head"><b>${escapeHtml(project.name)}</b><span>${project.progress}%</span></div><p>${statusText(project.status)}</p><div class="track"><span style="width:${project.progress}%"></span></div></div>`;
}

function openTaskModal() {
  modal(`<h2>新建任务</h2><form data-action="save-task"><div class="form-grid">
    <label class="field full">任务名称<input name="title" required></label>
    <label class="field">负责人<select name="assigneeId">${state.data.users.map((user) => `<option value="${user.id}">${escapeHtml(user.name)}</option>`).join("")}</select></label>
    <label class="field">所属项目<select name="projectId"><option value="">无项目</option>${state.data.projects.map((project) => `<option value="${project.id}">${escapeHtml(project.name)}</option>`).join("")}</select></label>
    <label class="field">优先级<select name="priority"><option value="medium">中</option><option value="high">高</option><option value="low">低</option></select></label>
    <label class="field">截止日期<input name="dueDate" type="date" required></label>
    </div><div class="modal-actions"><button type="button" class="btn" data-action="close-modal">取消</button><button class="btn btn-primary">创建任务</button></div></form>`);
}

function openTodoModal() {
  modal(`<h2>添加待办</h2><form data-action="save-todo"><div class="form-grid">
    <label class="field full">待办内容<input name="title" required></label>
    <label class="field full">说明<input name="note"></label>
    <label class="field">优先级<select name="priority"><option value="medium">中</option><option value="high">高</option><option value="low">低</option></select></label>
    </div><div class="modal-actions"><button type="button" class="btn" data-action="close-modal">取消</button><button class="btn btn-primary">添加</button></div></form>`);
}

async function withWrite(action, successMessage) {
  try {
    await action();
    await loadWorkbench();
    toast(successMessage);
  } catch (error) {
    renderApp();
    toast(error.message || "操作失败，请重试", true);
  }
}

window.addEventListener("hashchange", () => {
  state.route = location.hash.slice(1) || "dashboard";
  if (state.data) renderApp();
});

document.addEventListener("click", async (event) => {
  const target = event.target.closest("[data-action]");
  if (!target) return;
  const action = target.dataset.action;
  if (action === "menu") document.querySelector("#sidebar")?.classList.toggle("open");
  if (action === "retry") start();
  if (action === "logout") {
    await auth.signOut();
    state.session = null;
    state.profile = null;
    state.data = null;
    renderLogin();
  }
  if (action === "new-task") openTaskModal();
  if (action === "add-todo") openTodoModal();
  if (action === "close-modal") closeModal();
  if (action === "approve") {
    await withWrite(
      () => repository.updateTask(target.dataset.id, { status: "completed", progress: 100, latest: "管理员审核通过" }),
      "任务已审核通过"
    );
  }
  if (action === "toggle-todo") {
    const todo = state.data.todos.find((item) => item.id === target.dataset.id);
    await withWrite(() => repository.setTodoDone(todo.id, !todo.done), "待办状态已更新");
  }
});

document.addEventListener("submit", async (event) => {
  const action = event.target.dataset.action;
  if (!action) return;
  event.preventDefault();
  const values = Object.fromEntries(new FormData(event.target));
  if (action === "login") {
    root.innerHTML = loadingView("正在登录");
    try {
      await auth.signIn(values.email, values.password);
      state.session = await auth.getSession();
      await loadWorkbench();
    } catch (error) {
      renderLogin(error.message);
    }
  }
  if (action === "save-task") {
    closeModal();
    await withWrite(() => repository.createTask({ ...values, createdBy: state.profile.id }), "任务已创建");
  }
  if (action === "save-todo") {
    closeModal();
    await withWrite(() => repository.createTodo({ ...values, userId: state.profile.id }), "待办已添加");
  }
});

function modal(content) {
  document.querySelector("#modal-root").innerHTML = `<div class="modal-backdrop"><div class="modal">${content}</div></div>`;
}
function closeModal() {
  document.querySelector("#modal-root").innerHTML = "";
}
function toast(message, error = false) {
  const toastRoot = document.querySelector("#toast-root");
  toastRoot.innerHTML = `<div class="toast ${error ? "toast-error" : ""}">${escapeHtml(message)}</div>`;
  setTimeout(() => { toastRoot.innerHTML = ""; }, 2500);
}
function kpi(title, value, hint, color = "") {
  return `<div class="card kpi"><div class="kpi-head">${title}<span class="iconbox ${color}">${value}</span></div><div class="kpi-value">${value}</div><div class="hint">${hint}</div></div>`;
}
function panelTitle(title, action) {
  return `<div class="panel-title"><h2>${title}</h2><span class="text-link">${action}</span></div>`;
}
function empty(text) {
  return `<div class="empty">${text}</div>`;
}
function isOverdue(task) {
  return task.status !== "completed" && task.status !== "cancelled" && task.dueDate < new Date().toISOString().slice(0, 10);
}
function statusText(status) {
  return ({ pending: "待处理", in_progress: "进行中", waiting_review: "待审核", completed: "已完成", cancelled: "已取消", planning: "规划中" })[status] || status || "未知";
}
function priorityText(priority) {
  return ({ high: "高", medium: "中", low: "低" })[priority] || priority;
}
function userName(id) {
  return state.data.users.find((user) => user.id === id)?.name || "未分配";
}
function projectName(id) {
  return state.data.projects.find((project) => project.id === id)?.name || "未归类";
}
function escapeHtml(value = "") {
  const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
  return String(value).replace(/[&<>"']/g, (character) => map[character]);
}

start();

  </script>
</body>
</html>
